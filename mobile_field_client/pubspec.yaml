name: mobile_field_client
description: >
  Field operations Flutter client (new app root).
  Isolated from the existing Vue frontend and previously published builds.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
