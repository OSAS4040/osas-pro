# إقلاع compose على الـ runner ثم بوابة الجودة (مطابقة لـ make verify) ثم check.sh
#
# أسرار اختيارية (Settings → Secrets → Actions):
#   CI_REDIS_PASSWORD   CI_DB_PASSWORD
# إذا لم تُضاف، يُستخدم redis_password / saas_password (مناسب لتجارب compose فقط).

name: Deploy with gate

permissions:
  contents: read
  actions: write

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-gate-${{ github.ref }}
  cancel-in-progress: false

env:
  CHECK_BASE_URL: http://127.0.0.1
  HEALTH_WAIT_SECS: "180"
  DB_USERNAME: saas_user
  DB_DATABASE: saas_db
  DB_PASSWORD: saas_password
  REDIS_PASSWORD: redis_password

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare backend .env for CI
        run: |
          set -euo pipefail
          REDIS_PW="${REDIS_PASSWORD}"
          DB_PW="${DB_PASSWORD}"
          cp backend/.env.example backend/.env
          APP_KEY_VAL="base64:$(openssl rand -base64 32 | tr -d '\n')"
          sed -i "s#^APP_KEY=.*#APP_KEY=${APP_KEY_VAL}#" backend/.env
          sed -i "s|^DB_HOST=.*|DB_HOST=postgres|" backend/.env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${DB_PW}|" backend/.env
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${DB_USERNAME}|" backend/.env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=${DB_DATABASE}|" backend/.env
          sed -i "s|^REDIS_HOST=.*|REDIS_HOST=redis|" backend/.env
          sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=${REDIS_PW}|" backend/.env
          {
            echo ""
            echo "# CI overrides (docker compose networking)"
            echo "DB_HOST=postgres"
            echo "REDIS_HOST=redis"
            echo "DB_USERNAME=${DB_USERNAME}"
            echo "DB_DATABASE=${DB_DATABASE}"
            echo "DB_PASSWORD=${DB_PW}"
            echo "REDIS_PASSWORD=${REDIS_PW}"
          } >> backend/.env
          echo "REDIS_PASSWORD=${REDIS_PW}" >> "${GITHUB_ENV}"
          echo "DB_PASSWORD=${DB_PW}" >> "${GITHUB_ENV}"

      - name: Docker version
        run: docker --version && docker compose version

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for Laravel /up (bounded)
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + ${HEALTH_WAIT_SECS} ))
          attempt=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            attempt=$((attempt + 1))
            if curl -sfS -o /dev/null --max-time 10 "${CHECK_BASE_URL}/up"; then
              echo "Laravel /up OK (attempt ${attempt}, within ${HEALTH_WAIT_SECS}s budget)"
              exit 0
            fi
            echo "Waiting for /up... (${attempt})"
            sleep 3
          done
          echo "Timeout: /up not reachable within ${HEALTH_WAIT_SECS}s"
          docker compose ps || true
          docker compose logs --tail=100 nginx app 2>/dev/null || true
          exit 1

      - name: Run migrations (retry transient exec failures)
        run: |
          set -euo pipefail
          max_attempts=5
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Migration attempt ${attempt}/${max_attempts}"
            if docker compose ps --status running --services | grep -qx "app"; then
              if docker compose exec -T app php artisan migrate --force; then
                echo "Migrations completed successfully."
                exit 0
              fi
            else
              echo "App service is not in running state yet."
            fi
            echo "Migration attempt ${attempt} failed; collecting app diagnostics before retry..."
            docker compose ps app || true
            docker compose logs --tail=80 app 2>/dev/null || true
            attempt=$((attempt + 1))
            sleep 5
          done
          echo "Migrations failed after ${max_attempts} attempts."
          exit 1

      - name: Wait for dependency health (bounded)
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + ${HEALTH_WAIT_SECS} ))
          attempt=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            attempt=$((attempt + 1))
            if curl -sfS -o /dev/null --max-time 10 "${CHECK_BASE_URL}/api/v1/health"; then
              echo "Dependency health OK (attempt ${attempt}, within ${HEALTH_WAIT_SECS}s budget)"
              exit 0
            fi
            echo "Waiting for /api/v1/health... (${attempt})"
            sleep 3
          done
          echo "Timeout: /api/v1/health not healthy within ${HEALTH_WAIT_SECS}s"
          docker compose ps || true
          docker compose logs --tail=100 nginx app 2>/dev/null || true
          exit 1

      - name: Seed demo accounts (local CI .env only)
        run: docker compose exec -T app php artisan dev:demo-seed

      # مطابقة Makefile: verify — الواجهة أولاً (فشل سريع)، ثم الخادم
      - name: Frontend gate (npm ci, lint, build)
        run: |
          set -euo pipefail
          docker compose exec -T frontend sh -lc "cd /app && npm ci && npm run lint:check && npm run build"

      # قاعدة PHPUnit منفصلة (phpunit.xml / AppServiceProvider) — إنشاؤها إن لم تكن موجودة
      - name: Ensure test database (saas_test)
        run: |
          set -euo pipefail
          export PGPASSWORD="${DB_PASSWORD:-saas_password}"
          EXISTS=$(docker compose exec -T -e PGPASSWORD="$PGPASSWORD" postgres psql -U "${DB_USERNAME}" -d postgres -Atc \
            "SELECT 1 FROM pg_database WHERE datname = 'saas_test'" 2>/dev/null || echo "0")
          if [ "$EXISTS" = "1" ]; then
            echo "Database saas_test already exists"
          else
            echo "Creating database saas_test for PHPUnit"
            docker compose exec -T -e PGPASSWORD="$PGPASSWORD" postgres psql -U "${DB_USERNAME}" -d postgres -c "CREATE DATABASE saas_test;"
          fi

      - name: Backend tests (PHPUnit)
        run: docker compose exec -T app php artisan test

      - name: Run monitoring gate (blocks release on FAIL)
        env:
          FAIL_ON_FAILED_JOBS: "1"
        run: |
          set -euo pipefail
          chmod +x check.sh
          ./check.sh

      - name: Deploy / gate passed
        if: success()
        run: echo "STATUS PASS — verify (frontend + PHPUnit) and monitoring gate (check.sh) succeeded."

      - name: Collect compose diagnostics on failure
        if: failure()
        run: |
          mkdir -p ci-artifacts
          set +e
          docker compose ps &> ci-artifacts/compose-ps.txt
          docker compose logs --no-color &> ci-artifacts/compose-logs.txt
          docker compose exec -T app php artisan integrity:verify --json &> ci-artifacts/integrity-verify.json || true
          exit 0

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-failure-logs
          path: ci-artifacts/
          if-no-files-found: warn

      - name: Deploy blocked
        if: failure()
        run: |
          echo "STATUS FAIL — pipeline blocked."
          exit 1
