upstream frontend_upstream {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $php_fpm app:9000;

    root /var/www/public;
    index index.php index.html;

    # أمان: لا تعرض فهرس مجلدات أبداً (يمنع كشف هيكل الملفات مثل /landing/)
    autoindex off;

    client_max_body_size 50M;

    # ملفات التخزين العامة — يعمل حتى دون symlink public/storage (تطوير Docker)
    location ^~ /storage/ {
        alias /var/www/storage/app/public/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Dev tooling and non–front-controller PHP must never be executed via HTTP
    location ^~ /tools/ {
        deny all;
        return 403;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location ~ ^/(api|sanctum) {
        fastcgi_pass $php_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Only the Laravel front controller may execute PHP; block any other *.php under document root
    location ~ ^/index\.php$ {
        fastcgi_pass $php_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~ \.php$ {
        deny all;
        return 403;
    }

    location = /spa-unavailable.html {
        root /var/www/public;
        internal;
    }

    # الجذر يبقى على الواجهة (تجنّب index.php في public مع try_files)
    location = / {
        proxy_intercept_errors on;
        error_page 502 503 = /spa-unavailable.html;
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # صفحة الهبوط: وسوم وصف/مشاركة في HTML الأولي لبوتات لا تنفّذ JavaScript.
    # يجب مطابقة النص مع LANDING_META_DESCRIPTION في frontend/src/views/marketing/LandingView.vue
    # ملاحظة: يتطلب nginx مع ngx_http_sub_module؛ عطّل ضغط الاستجابة حتى يعمل sub_filter.
    location ~ ^/(landing|asas-pro|asaspro)/?$ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Accept-Encoding "";
        # text/html مضمّن افتراضياً في sub_filter_types — إعادة تعريفه تُسبب تحذير duplicate MIME
        sub_filter_once on;
        sub_filter '</head>' '<meta name="description" content="أسس برو — منصة SaaS عربية متعددة الأنشطة: تشغيل، موارد بشرية، مالي، محاسبي، مخزون، تحليلات وذكاء أعمال، وإعدادات وتكاملات. ورش وتجزئة وأساطيل في تدفق واحد. ابدأ تجربة عملية أو احجز عرضًا قصيرًا." /><meta property="og:title" content="أسس برو | منصة تشغيل أعمال ذكية" /><meta property="og:description" content="أسس برو — منصة SaaS عربية متعددة الأنشطة: تشغيل، موارد بشرية، مالي، محاسبي، مخزون، تحليلات وذكاء أعمال، وإعدادات وتكاملات. ورش وتجزئة وأساطيل في تدفق واحد. ابدأ تجربة عملية أو احجز عرضًا قصيرًا." /><meta property="og:type" content="website" /><meta property="og:url" content="$scheme://$host$request_uri" /><meta property="og:locale" content="ar_SA" /><meta property="og:image" content="$scheme://$host/og-asaspro.png" /><meta property="og:image:width" content="1200" /><meta property="og:image:height" content="630" /><meta name="twitter:card" content="summary_large_image" /><meta name="twitter:title" content="أسس برو | منصة تشغيل أعمال ذكية" /><meta name="twitter:description" content="أسس برو — منصة SaaS عربية متعددة الأنشطة: تشغيل، موارد بشرية، مالي، محاسبي، مخزون، تحليلات وذكاء أعمال، وإعدادات وتكاملات. ورش وتجزئة وأساطيل في تدفق واحد. ابدأ تجربة عملية أو احجز عرضًا قصيرًا." /><meta name="twitter:image" content="$scheme://$host/og-asaspro.png" /><link rel="canonical" href="$scheme://$host/landing" /></head>';
    }

    # SPA: ملفات حقيقية من public؛ غير الموجود → Vite (History API)
    # نزيل $uri/ لتفادي سلوك مجلدات غير مقصود ثم 404 بدل التوجيه للواجهة.
    location / {
        try_files $uri @vite_spa;
    }

    location @vite_spa {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }
}
