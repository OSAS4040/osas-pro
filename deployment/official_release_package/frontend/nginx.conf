# إنتاج الواجهة (Docker stage production) — SPA + أمان
# يمنع عرض «Index of /landing» عند وجود مجلد landing/ يحوي showcase/ فقط دون index داخله.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    autoindex off;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # معاينات الهبوط — ملفات ثابتة فقط؛ لا فهرسة مجلدات
    location ^~ /landing/showcase/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # مسارات الهبوط وأسمائها البديلة → دائماً تطبيق Vue (تجاوز مجلد landing/ الفارغ على القرص)
    location ~ ^/(landing|asas-pro|asaspro)/?$ {
        rewrite ^ /index.html last;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
