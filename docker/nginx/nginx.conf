user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Stable request id for PHP-FPM when the client omits X-Request-Id (observability / log correlation).
    map $http_x_request_id $resolved_request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $upstream_status $request_time $upstream_response_time $upstream_connect_time $upstream_header_time '
                    '$body_bytes_sent "$http_referer" "$http_user_agent" "$http_x_forwarded_for" '
                    'req_x_request_id="$http_x_request_id" sent_x_request_id="$sent_http_x_request_id" '
                    'req_x_trace_id="$http_x_trace_id" sent_x_trace_id="$sent_http_x_trace_id"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    include /etc/nginx/conf.d/*.conf;
}
