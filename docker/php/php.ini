; ──────────────────────────────────────────────────────────────
; OSAS Production PHP Configuration — Performance Optimized
; ──────────────────────────────────────────────────────────────

; Memory & Upload
memory_limit          = 512M
upload_max_filesize   = 64M
post_max_size         = 64M
max_execution_time    = 120
max_input_time        = 120
realpath_cache_size   = 4096K
realpath_cache_ttl    = 600
date.timezone         = Asia/Riyadh

; ── OPcache (critical for PHP speed) ──────────────────────────
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 256
opcache.interned_strings_buffer= 32
opcache.max_accelerated_files  = 20000
opcache.max_wasted_percentage  = 5
opcache.use_cwd                = 1
opcache.validate_timestamps    = 0
; ↑ 0 = never recheck file mtime = maximum speed (restart to update)
opcache.revalidate_freq        = 0
opcache.save_comments          = 1
opcache.fast_shutdown          = 1
opcache.file_update_protection = 0

; ── PHP 8.x JIT (just-in-time compiler) ───────────────────────
; tracing mode = best for long-running Laravel requests
opcache.jit                    = tracing
opcache.jit_buffer_size        = 128M
opcache.jit_hot_func           = 5
opcache.jit_hot_loop           = 64
opcache.jit_hot_return         = 8
opcache.jit_hot_side_exit      = 8

; ── Session ────────────────────────────────────────────────────
session.gc_maxlifetime         = 7200
session.cookie_secure          = 0
session.use_strict_mode        = 1

; ── Error Reporting (production) ──────────────────────────────
error_reporting  = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE
display_errors   = Off
log_errors       = On
error_log        = /var/log/php/error.log

; ── Misc ───────────────────────────────────────────────────────
expose_php       = Off
short_open_tag   = Off
output_buffering = 4096
zlib.output_compression = On
