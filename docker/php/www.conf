[www]
user  = www-data
group = www-data
listen = 9000

; ── Process Manager: dynamic ──────────────────────────────────
pm                    = dynamic
pm.max_children       = 80
; tuned for high-concurrency API load, bounded by container memory limit

pm.start_servers      = 20
pm.min_spare_servers  = 10
pm.max_spare_servers  = 30
pm.max_requests       = 500
; recycle sooner under heavy traffic to cap per-worker memory drift

; ── Status & Slow Log ──────────────────────────────────────────
pm.status_path        = /fpm-status
ping.path             = /fpm-ping
ping.response         = pong

slowlog               = /tmp/php-fpm-slow.log
request_slowlog_timeout = 3s
; Log slow requests for tuning and regression tracking

request_terminate_timeout = 120s

; ── Env passthrough ───────────────────────────────────────────
clear_env             = no

; ── Keep alive connections ────────────────────────────────────
; Reduces TCP handshake overhead between Nginx → PHP-FPM
php_admin_value[expose_php]           = Off
php_admin_value[error_log]            = /var/log/php/error.log
php_admin_flag[log_errors]            = On
php_admin_value[memory_limit]         = 512M
