[www]
user  = www-data
group = www-data
listen = 9000

; ── Process Manager: dynamic ──────────────────────────────────
pm                    = dynamic
pm.max_children       = 40
; max concurrency = 40 requests at once (512M / 40 = 12.8MB avg per worker)

pm.start_servers      = 10
pm.min_spare_servers  = 5
pm.max_spare_servers  = 20
pm.max_requests       = 1000
; ↑ Recycle workers every 1000 requests to prevent memory creep

; ── Status & Slow Log ──────────────────────────────────────────
pm.status_path        = /fpm-status
ping.path             = /fpm-ping
ping.response         = pong

;slowlog               = /var/log/php/slow.log
;request_slowlog_timeout = 2s
; ↑ Log any request slower than 2 seconds

request_terminate_timeout = 60s

; ── Env passthrough ───────────────────────────────────────────
clear_env             = no

; ── Keep alive connections ────────────────────────────────────
; Reduces TCP handshake overhead between Nginx → PHP-FPM
php_admin_value[expose_php]           = Off
php_admin_value[error_log]            = /var/log/php/error.log
php_admin_flag[log_errors]            = On
php_admin_value[memory_limit]         = 512M
